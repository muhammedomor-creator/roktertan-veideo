<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>রক্তের টান - ভিডিও পোর্টাল</title>
    <!-- টেইলউইন্ড সিএসএস (ডিজাইনের জন্য) -->
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <style>
        .line-clamp-2 {
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;  
            overflow: hidden;
        }
    </style>
</head>
<body class="bg-gray-50 text-gray-800 font-sans">

    <!-- হেডার সেকশন -->
    <header class="bg-red-600 text-white shadow-md sticky top-0 z-50">
        <div class="max-w-7xl mx-auto px-4 py-4 flex flex-col sm:flex-row justify-between items-center gap-4">
            <div class="flex items-center gap-2">
                <span class="text-2xl font-bold tracking-wide">🩸 রক্তের টান (ভিডিও পোর্টাল)</span>
            </div>
            
            <div class="flex items-center gap-3">
                <!-- ব্যাকগ্রাউন্ডে নতুন ভিডিও খোঁজার স্ট্যাটাস লাইট -->
                <div id="sync-indicator" class="flex items-center gap-2 bg-red-700 px-3 py-1.5 rounded-full text-xs font-semibold">
                    <span class="relative flex h-2.5 w-2.5">
                        <span class="animate-ping absolute inline-flex h-full w-full rounded-full bg-green-400 opacity-75"></span>
                        <span class="relative inline-flex rounded-full h-2.5 w-2.5 bg-green-500"></span>
                    </span>
                    <span id="sync-status">চেক করা হচ্ছে...</span>
                </div>

                <a 
                  href="https://emergencyroktolagbe.vercel.app/" 
                  target="_blank" 
                  rel="noopener noreferrer"
                  class="bg-white text-red-600 hover:bg-gray-100 px-5 py-2 rounded-lg font-bold shadow transition text-sm flex items-center"
                >
                  🔍 রক্ত খুঁজুন
                </a>
            </div>
        </div>
    </header>

    <!-- মূল কন্টেন্ট -->
    <main class="max-w-7xl mx-auto px-4 py-8">
        <div class="text-center mb-8">
            <h1 class="text-3xl font-extrabold text-gray-900 mb-2">মেডিকেল, স্বাস্থ্য ও চিকিৎসা সচেতনতা ভিডিও পোর্টাল</h1>
            <p id="total-count-text" class="text-gray-600 text-sm">তথ্য লোড হচ্ছে...</p>
        </div>

        <!-- ভিডিও গ্রিড -->
        <div id="video-grid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8">
            <!-- জাভাস্ক্রিপ্ট দিয়ে ভিডিওর কার্ডগুলো এখানে বসবে -->
        </div>

        <!-- লোডিং বা মেসেজ সেকশন -->
        <div id="loading" class="text-center py-10 text-xl font-medium text-gray-500">
            দয়া করে অপেক্ষা করুন, ভিডিও লোড হচ্ছে...
        </div>
    </main>

    <!-- ব্যাকগ্রাউন্ড নোটিফিকেশন টোস্ট (Toast) -->
    <div id="toast" class="fixed bottom-5 right-5 bg-gray-900 text-white px-5 py-3 rounded-xl shadow-2xl transition-all duration-500 transform translate-y-20 opacity-0 flex items-center gap-3 z-50">
        <span class="text-xl">✨</span>
        <span id="toast-message" class="text-sm font-medium">নতুন ভিডিও যুক্ত হয়েছে!</span>
    </div>

    <!-- ফুটার -->
    <footer class="bg-gray-900 text-gray-400 py-6 mt-12 text-center text-sm border-t border-gray-800">
        <p>© ২০২৬ রক্তের টান। সর্বস্বত্ব সংরক্ষিত।</p>
    </footer>

    <!-- ফায়ারবেজ লাইব্রেরি এবং কাস্টম লজিক (CDN) -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, collection, doc, getDoc, setDoc, getDocs, query, orderBy, startAfter, limit } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        // আপনার ফায়ারবেজ কনফিগারেশন
        const firebaseConfig = {
            apiKey: "AIzaSyDnThVM1xdap1VKG7bSuB5q_HVxNcsjrrI",
            authDomain: "roktertanveideoportal.firebaseapp.com",
            projectId: "roktertanveideoportal",
            storageBucket: "roktertanveideoportal.firebasestorage.app",
            messagingSenderId: "995650365132",
            appId: "1:995650365132:web:0da1579dc8df0ebff0c469",
            measurementId: "G-4EB0BQTVW2"
        };

        // ফায়ারবেজ ইনিশিয়ালাইজ
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        // ইউটিউব কনফিগারেশন
        const YOUTUBE_API_KEY = 'AIzaSyBwieraquhUI5OSIuj5jld-G-IPK-bLx9c';

        // মেডিকেল ও চিকিৎসা সম্পর্কিত বিচিত্র কিওয়ার্ড ব্যাংক (প্রতি সিঙ্কে একটি ভিন্ন কিওয়ার্ড ব্যবহার হবে)
        const SEARCH_KEYWORDS = [
            'রক্তদান সচেতনতা রক্ত দেওয়ার উপকারিতা',
            'Bangladeshi doctor health advice পরামর্শ',
            'ডাক্তারের স্বাস্থ্য টিপস রোগ নিরাময় চিকিৎসা',
            'হৃদরোগের লক্ষণ ও প্রতিকার সচেতনতা',
            'কিডনি রোগ সচেতনতা চিকিৎসা পরামর্শ',
            'ডায়াবেটিস নিয়ন্ত্রণ টিপস ডাক্তার',
            'মা ও শিশুর যত্ন স্বাস্থ্য সচেতনতা মেডিকেল',
            'পুষ্টিবিদ পরামর্শ Diet Chart Bangla',
            'মেডিসিন বিশেষজ্ঞ পরামর্শ রোগ নিরাময়',
            'উচ্চ রক্তচাপ হাইপারটেনশন প্রতিকার'
        ];

        let lastVisibleDoc = null; // ইনফিনিটি স্ক্রলিংয়ের জন্য শেষ ডকুমেন্টের ট্র্যাক
        let isFetchingNextPage = false;
        let hasMoreVideos = true;
        let activeVideoContainerId = null; // বর্তমানে কোন প্লেয়ার চালু আছে তা ট্র্যাক করার জন্য

        const loadingEl = document.getElementById('loading');
        const gridEl = document.getElementById('video-grid');
        const syncStatus = document.getElementById('sync-status');
        const totalCountText = document.getElementById('total-count-text');
        const toast = document.getElementById('toast');
        const toastMessage = document.getElementById('toast-message');

        // নোটিফিকেশন দেখানোর ফাংশন
        function showToast(message) {
            toastMessage.innerText = message;
            toast.classList.remove('translate-y-20', 'opacity-0');
            setTimeout(() => {
                toast.classList.add('translate-y-20', 'opacity-0');
            }, 5000);
        }

        // থাম্বনেইল প্লে করার ও আগের প্লেয়ার বন্ধ করার প্রফেশনাল লজিক
        window.playVideo = function(videoId, containerId) {
            // যদি আগে কোনো ভিডিও চলতে থাকে, সেটিকে আবার থাম্বনেইলে রূপান্তর করব
            if (activeVideoContainerId && activeVideoContainerId !== containerId) {
                const prevContainer = document.getElementById(activeVideoContainerId);
                if (prevContainer) {
                    const prevVideoId = prevContainer.getAttribute('data-video-id');
                    const prevTitle = prevContainer.getAttribute('data-title');
                    // থাম্বনেইল স্ট্রাকচার ফিরিয়ে দেওয়া
                    prevContainer.innerHTML = getThumbnailHTML(prevVideoId, prevTitle, activeVideoContainerId);
                }
            }

            // নতুন ভিডিওটি প্লে করা
            const currentContainer = document.getElementById(containerId);
            if (currentContainer) {
                activeVideoContainerId = containerId;
                currentContainer.innerHTML = `
                    <iframe
                        class="absolute top-0 left-0 w-full h-full"
                        src="https://www.youtube.com/embed/${videoId}?autoplay=1&enablejsapi=1"
                        title="YouTube video player"
                        frameborder="0"
                        allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture"
                        allowfullscreen
                    ></iframe>
                `;
            }
        }

        // থাম্বনেইল কার্ডের এইচটিএমএল স্ট্রাকচার
        function getThumbnailHTML(videoId, title, containerId) {
            return `
                <img src="https://img.youtube.com/vi/${videoId}/mqdefault.jpg" alt="${title}" class="absolute top-0 left-0 w-full h-full object-cover" loading="lazy">
                <!-- ডার্ক ওভারলে এবং প্লে বাটন -->
                <div class="absolute inset-0 bg-black/30 hover:bg-black/10 transition-colors flex items-center justify-center cursor-pointer" onclick="playVideo('${videoId}', '${containerId}')">
                    <div class="bg-red-600 hover:bg-red-700 text-white rounded-full p-4 shadow-2xl transition-transform hover:scale-110">
                        <svg class="w-8 h-8 fill-current" viewBox="0 0 24 24">
                            <path d="M8 5v14l11-7z"/>
                        </svg>
                    </div>
                </div>
            `;
        }

        // স্ক্রিনে ভিডিও কার্ড রেন্ডার করা
        function appendVideosToGrid(videoList) {
            videoList.forEach(video => {
                const containerId = `player-container-${video.videoId}`;
                const card = document.createElement('div');
                card.className = "bg-white rounded-xl overflow-hidden shadow-md hover:shadow-xl transition-all duration-300 flex flex-col";
                card.innerHTML = `
                    <div id="${containerId}" data-video-id="${video.videoId}" data-title="${video.title.replace(/"/g, '&quot;')}" class="relative aspect-video w-full bg-black">
                        ${getThumbnailHTML(video.videoId, video.title, containerId)}
                    </div>
                    <div class="p-5 flex flex-col flex-grow">
                        <h2 class="text-md font-bold text-gray-900 line-clamp-2 mb-2">${video.title}</h2>
                        <p class="text-xs text-red-500 font-semibold">চ্যানেল: ${video.channelTitle}</p>
                    </div>
                `;
                gridEl.appendChild(card);
            });
            loadingEl.classList.add('hidden');
        }

        // ইউটিউব থেকে নতুন ২০টি ভিডিও নিয়ে এসে ফায়ারবেজে সেভ করা (ব্যাকগ্রাউন্ড প্রসেস)
        async function runBackgroundSync() {
            syncStatus.innerText = "নতুন ভিডিও খোঁজা হচ্ছে...";
            try {
                // কিওয়ার্ড ব্যাংক থেকে র‍্যান্ডম একটি কিওয়ার্ড পছন্দ করা
                const randomKeyword = SEARCH_KEYWORDS[Math.floor(Math.random() * SEARCH_KEYWORDS.length)];
                
                const url = `https://www.googleapis.com/youtube/v3/search?key=${YOUTUBE_API_KEY}&q=${encodeURIComponent(randomKeyword)}&part=snippet&maxResults=20&type=video&videoEmbeddable=true&regionCode=BD`;
                const response = await fetch(url);
                const data = await response.json();

                if (!data.items || data.items.length === 0) {
                    syncStatus.innerText = "সিঙ্ক সম্পন্ন";
                    return;
                }

                let newlyAddedCount = 0;

                for (const item of data.items) {
                    const videoId = item.id.videoId;
                    const docRef = doc(db, "saved_portal_videos", videoId);
                    const docSnap = await getDoc(docRef);

                    // যদি ভিডিওটি আগে থেকে সেভ না থাকে, তবেই সেভ হবে
                    if (!docSnap.exists()) {
                        await setDoc(docRef, {
                            videoId: videoId,
                            title: item.snippet.title,
                            channelTitle: item.snippet.channelTitle,
                            timestamp: Date.now()
                        });
                        newlyAddedCount++;
                    }
                }

                syncStatus.innerText = "সিঙ্ক সম্পন্ন";
                if (newlyAddedCount > 0) {
                    showToast(`সফলতা! আরও ${newlyAddedCount}টি নতুন ইউনিক মেডিকেল ভিডিও ডেটাবেজে যুক্ত হয়েছে।`);
                }
            } catch (error) {
                console.error("ব্যাকগ্রাউন্ড সিঙ্ক এরর:", error);
                syncStatus.innerText = "সিঙ্ক বিঘ্নিত";
            }
        }

        // ফায়ারবেজ থেকে কুয়েরি করে পরবর্তী পেজ (Next 20 Videos) লোড করার ফাংশন
        async function loadNextPage() {
            if (isFetchingNextPage || !hasMoreVideos) return;
            isFetchingNextPage = true;
            loadingEl.innerText = "আরও ভিডিও লোড হচ্ছে...";
            loadingEl.classList.remove('hidden');

            try {
                let nextQuery;
                if (lastVisibleDoc) {
                    nextQuery = query(
                        collection(db, "saved_portal_videos"),
                        orderBy("timestamp", "desc"),
                        startAfter(lastVisibleDoc),
                        limit(20)
                    );
                } else {
                    nextQuery = query(
                        collection(db, "saved_portal_videos"),
                        orderBy("timestamp", "desc"),
                        limit(20)
                    );
                }

                const querySnapshot = await getDocs(nextQuery);
                
                if (querySnapshot.empty) {
                    hasMoreVideos = false;
                    loadingEl.innerText = "সব ভিডিও লোড করা সম্পন্ন হয়েছে।";
                    return;
                }

                lastVisibleDoc = querySnapshot.docs[querySnapshot.docs.length - 1];
                let videoBatch = [];
                querySnapshot.forEach((doc) => {
                    videoBatch.push(doc.data());
                });

                appendVideosToGrid(videoBatch);
            } catch (error) {
                console.error("নেক্সট পেজ লোড এরর:", error);
            } finally {
                isFetchingNextPage = false;
            }
        }

        // ইনফিনিটি স্ক্রলিং ইভেন্ট লিসেনার
        window.addEventListener('scroll', () => {
            const { scrollTop, scrollHeight, clientHeight } = document.documentElement;
            // স্ক্রল করে পেজের নিচ থেকে ৪০০ পিক্সেল উপরে আসলেই নতুন ডেটা লোড করবে
            if (scrollTop + clientHeight >= scrollHeight - 400) {
                loadNextPage();
            }
        });

        // পোর্টাল চালু করার মেইন ফাংশন
        async function initPortal() {
            try {
                // প্রথম ২০টি ভিডিও ডেটাবেজ থেকে অত্যন্ত দ্রুত লোড করা
                await loadNextPage();

                // টোটাল কয়টি ভিডিও আছে তা ফায়ারবেজ থেকে জানা
                const countQuery = query(collection(db, "saved_portal_videos"));
                const countSnapshot = await getDocs(countQuery);
                totalCountText.innerText = `আমাদের ডেটাবেজে মোট ${countSnapshot.size}টি মেডিকেল ও চিকিৎসা ভিডিও সংরক্ষিত আছে।`;

                // প্রথম ব্যাচ লোড হয়ে যাওয়ার পর নীরবে ব্যাকগ্রাউন্ডে ইউটিউব থেকে নতুন ডেটা চেক হবে
                setTimeout(runBackgroundSync, 3000); // পেজ রেডি হওয়ার ৩ সেকেন্ড পর রান হবে
            } catch (e) {
                console.error("ফায়ারবেজ ইনিশিয়েট সমস্যা:", e);
                loadingEl.innerText = "কানেকশন বিঘ্নিত হয়েছে। দয়া করে পেজটি রিফ্রেশ দিন।";
            }
        }

        // পেজ লোড সম্পন্ন হলে রান হবে
        window.onload = initPortal;
    </script>
</body>
</html>
